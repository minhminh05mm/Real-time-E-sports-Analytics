services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: es_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - esports_net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: es_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - esports_net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: es_kafka_ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - esports_net

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: es_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ../data/clickhouse_data:/var/lib/clickhouse
      - ./clickhouse_init:/docker-entrypoint-initdb.d
    environment:
      CLICKHOUSE_DB: esports
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    networks:
      - esports_net

  metabase:
    image: metabase/metabase:v0.47.2
    container_name: es_metabase
    ports:
      - "3000:3000"
    volumes:
      - ../metabase-plugins:/plugins
    environment:
      MB_PLUGINS_DIR: /plugins
    networks:
      - esports_net

networks:
  esports_net:
    driver: bridge
